<svg viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="920" height="300" rx="14" fill="#F5F0EB"/>

  <!-- title -->
  <text x="36" y="52" font-size="20" font-weight="700" fill="#2B2B28">Shitcode Red-Light · PostToolUse</text>

  <!-- node 1: write -->
  <rect x="36" y="108" width="150" height="64" rx="10" fill="#FFFFFF" stroke="#CC785C" stroke-width="2"/>
  <text x="111" y="138" font-size="13" font-weight="600" fill="#2B2B28" text-anchor="middle">you write</text>
  <text x="111" y="156" font-size="13" font-weight="600" fill="#2B2B28" text-anchor="middle">a source file</text>

  <!-- arrow -->
  <line x1="190" y1="140" x2="232" y2="140" stroke="#CC785C" stroke-width="2"/>
  <polygon points="232,135 242,140 232,145" fill="#CC785C"/>

  <!-- node 2: hook -->
  <rect x="246" y="108" width="150" height="64" rx="10" fill="#FFFFFF" stroke="#CC785C" stroke-width="2"/>
  <text x="321" y="138" font-size="13" font-weight="600" fill="#2B2B28" text-anchor="middle">PostToolUse</text>
  <text x="321" y="156" font-size="12" fill="#7C766B" text-anchor="middle">6 detectors run</text>

  <!-- arrow -->
  <line x1="400" y1="140" x2="442" y2="140" stroke="#CC785C" stroke-width="2"/>
  <polygon points="442,135 452,140 442,145" fill="#CC785C"/>

  <!-- decision diamond -->
  <polygon points="506,108 558,140 506,172 454,140" fill="#FFFFFF" stroke="#CC785C" stroke-width="2"/>
  <text x="506" y="145" font-size="12" font-weight="600" fill="#2B2B28" text-anchor="middle">hit?</text>

  <!-- branch up: no -> silent -->
  <line x1="506" y1="108" x2="506" y2="74" stroke="#9B9B93" stroke-width="2"/>
  <line x1="506" y1="74" x2="690" y2="74" stroke="#9B9B93" stroke-width="2"/>
  <polygon points="690,69 700,74 690,79" fill="#9B9B93"/>
  <text x="516" y="68" font-size="11" fill="#9B9B93">no</text>
  <rect x="704" y="52" width="180" height="44" rx="10" fill="#EFEAE2" stroke="#9B9B93" stroke-width="1.5"/>
  <text x="794" y="79" font-size="13" fill="#7C766B" text-anchor="middle">silent · move on</text>

  <!-- branch right: yes -> red light -->
  <line x1="558" y1="140" x2="600" y2="140" stroke="#E03E2D" stroke-width="2"/>
  <polygon points="600,135 610,140 600,145" fill="#E03E2D"/>
  <text x="566" y="132" font-size="11" fill="#E03E2D">yes</text>

  <!-- red light box -->
  <rect x="614" y="104" width="270" height="120" rx="10" fill="#FFFFFF" stroke="#E03E2D" stroke-width="2.5"/>
  <text x="632" y="130" font-size="14" font-weight="700" fill="#E03E2D">🚩 soft red light</text>
  <text x="632" y="156" font-size="12" fill="#2B2B28">(1) fix it now</text>
  <text x="632" y="178" font-size="12" fill="#2B2B28">(2) write one line on</text>
  <text x="650" y="196" font-size="12" fill="#2B2B28">why you're not</text>
  <text x="632" y="216" font-size="11" fill="#7C766B">— injected, never blocks</text>

  <!-- footer -->
  <text x="36" y="262" font-size="12" fill="#7C766B">soft injection only — a PostToolUse block can't roll back the file and loops forever. hard-block is left to PreToolUse.</text>
  <text x="36" y="282" font-size="12" fill="#7C766B">treats the motivation ("just cut a corner"), not a metric.</text>
</svg>
